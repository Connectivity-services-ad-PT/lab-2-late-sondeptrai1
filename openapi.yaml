openapi: 3.1.0
info:
  title: Smart Campus — IoT Ingestion API (A1)
  version: 1.0.0
  description: |
    API dành cho các thiết bị cảm biến (Hardware IoT) đẩy dữ liệu lên hệ thống IoT Ingestion (A1).
    Hệ thống sẽ tiếp nhận, kiểm tra dữ liệu và sau đó đẩy vào Message Broker cho Analytics và Core Business xử lý.
  contact:
    name: Nhóm A1 - IoT Ingestion
servers:
  - url: http://localhost:4010
    description: Prism mock server
  - url: https://api.campus.local/iot
    description: Production Server
tags:
  - name: health
    description: Kiểm tra trạng thái gateway
  - name: telemetry
    description: Tiếp nhận dữ liệu đo lường từ thiết bị
  - name: devices
    description: Quản lý trạng thái thiết bị
security:
  - bearerAuth: []
paths:
  /health:
    get:
      operationId: getHealth
      summary: Kiểm tra trạng thái IoT Gateway
      description: Endpoint để các hệ thống monitor kiểm tra Gateway còn sống không.
      tags: [health]
      security: []
      responses:
        '200':
          description: Service đang hoạt động
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              examples:
                ok:
                  value:
                    status: ok
                    service: iot-ingestion-gateway
                    time: '2026-05-24T08:00:00Z'

  /telemetry:
    post:
      operationId: ingestTelemetry
      summary: Đẩy dữ liệu đo lường
      description: Thiết bị IoT gọi API này để gửi dữ liệu nhiệt độ, độ ẩm (Sử dụng đa hình đa dạng loại cảm biến).
      tags: [telemetry]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelemetryPayload'
            examples:
              tempReading:
                value:
                  deviceId: SENSOR-T-001
                  metricType: TEMPERATURE
                  value: 36.5
                  unit: celsius
                  batteryLevel: 85
              smokeReading:
                value:
                  deviceId: SENSOR-S-002
                  metricType: SMOKE
                  smokeLevel: 450
                  isAlarm: true
      responses:
        '202':
          description: Dữ liệu đã được tiếp nhận và đưa vào hàng đợi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /devices/{deviceId}/status:
    post:
      operationId: updateDeviceStatus
      summary: Cập nhật trạng thái thiết bị
      description: Báo cáo trạng thái online, offline hoặc sắp hết pin.
      tags: [devices]
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceStatusUpdate'
      responses:
        '200':
          description: Đã cập nhật trạng thái
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /telemetry/latest:
    get:
      operationId: getLatestTelemetry
      summary: Lấy dữ liệu cảm biến gần nhất
      description: API hỗ trợ cho việc debug xem thiết bị vừa gửi lên cái gì.
      tags: [telemetry]
      parameters:
        - name: deviceId
          in: query
          required: true
          description: Mã thiết bị.
          schema:
            type: string
            pattern: '^[A-Z0-9-]+$'
      responses:
        '200':
          description: Trả về bản ghi mới nhất
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryPayload'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    DeviceId:
      name: deviceId
      in: path
      required: true
      description: Mã định danh của cảm biến.
      schema:
        type: string
        pattern: '^[A-Z0-9-]+$'

  schemas:
    HealthStatus:
      type: object
      additionalProperties: false
      required: [status, service, time]
      properties:
        status:
          type: string
          enum: ["ok"]
        service:
          type: string
        time:
          type: string
          format: date-time

    TelemetryPayload:
      oneOf:
        - $ref: '#/components/schemas/TemperatureReading'
        - $ref: '#/components/schemas/SmokeReading'
      discriminator:
        propertyName: metricType
        mapping:
          TEMPERATURE: '#/components/schemas/TemperatureReading'
          SMOKE: '#/components/schemas/SmokeReading'

    BaseReading:
      type: object
      required: [deviceId, metricType]
      properties:
        deviceId:
          type: string
          pattern: '^[A-Z0-9-]+$'
        metricType:
          type: string
        batteryLevel:
          type: [number, "null"]
          description: Phần trăm pin còn lại (union type với null nếu cắm điện trực tiếp).
          minimum: 0
          maximum: 100

    TemperatureReading:
      allOf:
        - $ref: '#/components/schemas/BaseReading'
        - type: object
          required: [value, unit]
          properties:
            metricType:
              type: string
              const: TEMPERATURE
            value:
              type: number
            unit:
              type: string
              enum: ["celsius", "fahrenheit"]

    SmokeReading:
      allOf:
        - $ref: '#/components/schemas/BaseReading'
        - type: object
          required: [smokeLevel, isAlarm]
          properties:
            metricType:
              type: string
              const: SMOKE
            smokeLevel:
              type: number
              description: Nồng độ khói
            isAlarm:
              type: boolean

    DeviceStatusUpdate:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: ["ONLINE", "OFFLINE", "MAINTENANCE"]
        errorCode:
          type: [string, "null"]
          description: Mã lỗi nếu thiết bị bị hỏng.
        batteryLevel:
          type: [number, "null"]

    IngestResponse:
      type: object
      additionalProperties: false
      required: [eventId, status]
      properties:
        eventId:
          type: string
          format: uuid
        status:
          type: string
          enum: ["ACCEPTED"]

    Problem:
      type: object
      additionalProperties: false
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: [string, "null"]
        instance:
          type: [string, "null"]
          format: uri

  responses:
    BadRequest:
      description: Dữ liệu sai định dạng
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Unauthorized:
      description: Lỗi xác thực
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Không tìm thấy tài nguyên
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    UnprocessableEntity:
      description: Dữ liệu đúng cấu trúc JSON nhưng sai logic nghiệp vụ
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
